<body>      

    <div class="title-header">[ Shubh Madhavan's Cards from History ]</div>


    <div class="settings-container">

    <div id="settings-cog">⚙️</div>

    <div id="settings-panel" class="hidden">

        <h3>Game Settings</h3>

        <label>
            <input type="checkbox" id="setting-AH" checked>
            Include Ancient History
        </label>

        <label>
            <input type="checkbox" id="setting-MD" checked>
            Include Medieval Indian History
        </label>

        <label>
            <input type="checkbox" id="setting-MH" checked>
            Include Modern Indian History
        </label>

        <label>
            <input type="checkbox" id="setting-WH" checked>
            Include World History
        </label>

        <button id="apply-settings">Apply</button>

    </div>

</div>



<div class="sub-title-header" style="font-size:0.95rem;"> <span class="text-span">Question Card:</span></div>

                    <div class="game-container" style="margin-top: -2px">
                        
                        <div class="card-container-question" id="card-container-question">
                            <div class="card" id="question-card">
                                <div class="card-info">
                                    <h3 id="question-event"></h3>
                                </div>
                            </div>
                        </div>
                    </div>


<hr style="opacity: 0.2; margin-top: -4px;">
<div class="sub-title-header" style="font-size:0.95rem; margin-top: 0px"> <span class="text-span">Answer Deck:</span></div>

<div class="sub-title-header" style="font-size:0.8rem;margin-top: 5px"> <span class="text-span">Place the Question card in the correct chronological position below</span></div>

                    <div class="game-container"  style="margin-top: 2px">
                        <div class="card-container-table" id="card-container-table">
                        </div>
                    </div>

                    <div class="strike-zone">

                        <label>
                            <button  class="Advance"> <p id="score">Score: 0</p></button>
                            </label>  
                            <br><br>
                            
                        <div class="hearts">
                            <div id="heart1" class="heart"> ❤️ </div>
                            <div id="heart2" class="heart"> ❤️ </div>
                            <div id="heart3" class="heart"> ❤️ </div>
                        </div>

                        
                    </div>
