<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubh's Cards of History</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>      

    <div class="settings-container">

    <div id="settings-cog">⚙️</div>

    <div id="settings-panel" class="hidden">

        <h3>Game Settings</h3>

        <label>
            <input type="checkbox" id="setting-AH" checked>
            Include Ancient History
        </label>

        <label>
            <input type="checkbox" id="setting-MD" checked>
            Include Medieval Indian History
        </label>

        <label>
            <input type="checkbox" id="setting-MH" checked>
            Include Modern Indian History
        </label>

        <label>
            <input type="checkbox" id="setting-WH" checked>
            Include World History
        </label>

        <button id="apply-settings">Apply</button>

    </div>

</div>

    <div class="game-container">
        <div class="card-container-question" id="card-container-question">
            <div class="card" id="question-card">
                <div class="card-info">
                    <h3 id="question-event"></h3>
                </div>
            </div>
        </div>
    </div>

    <div class="game-container">
        <div class="card-container-table" id="card-container-table">
        </div>
    </div>

    <div class="strike-zone">

        <label>
            <button  class="Advance"> <p id="score">Score: 0</p></button>
            </label>  
            <br><br>
            
        <div class="hearts">
            <div id="heart1" class="heart"> ❤️ </div>
            <div id="heart2" class="heart"> ❤️ </div>
            <div id="heart3" class="heart"> ❤️ </div>
        </div>

           
    </div>


    <script src="script.js"></script> 
    

</body>
</html>
